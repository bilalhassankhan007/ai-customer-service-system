<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Customer Service Dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">AI Customer Service Dashboard</h1>

        <form method="POST" class="mt-4">
            <div class="form-group">
                <label for="query">Query</label>
                <input type="text" class="form-control" id="query" name="query" required>
            </div>
            <div class="form-group">
                <label for="response">Response</label>
                <input type="text" class="form-control" id="response" name="response" required>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        <h2 class="mt-5">Escalated Calls</h2>
<table class="table">
    <thead>
        <tr>
            <th>Query</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for call in escalated_calls %}
        <tr>
            <td>{{ call.query }}</td>
            <td>
                {% if call.status == "Resolved" %}
                    <span class="badge badge-success">Resolved</span>
                {% else %}
                    <span class="badge badge-warning">Pending</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
    </div>
</body>
</html>
